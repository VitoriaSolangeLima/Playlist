<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Arquivo Sonoro - Acervo Musical</title>
  <style>
    :root {
      --bg-color: #f4ecd8;
      --card-bg: #fffbf0;
      --text-color: #2c251e;
      --accent: #5c3a21;
      --accent-hover: #3d2514;
      --border-color: #c8b99d;
      --danger: #962d22;
    }

    body {
      font-family: "Courier New", Courier, monospace;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 25px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    #vinyl {
      width: 50px;
      height: 50px;
      border: 5px solid #2c251e;
      border-radius: 50%;
      background: radial-gradient(circle, #fffbf0 10px, #2c251e 11px, #2c251e 15px, #1a1512 16px);
      display: inline-block;
    }

    #vinyl.spinning {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -1px;
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--accent);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 2px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.03);
    }

    h2 {
      margin-top: 0;
      font-size: 1.2rem;
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    input {
      padding: 8px;
      font-family: inherit;
      border: 1px solid var(--border-color);
      background: #fff;
      border-radius: 2px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 8px 15px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button.secondary {
      background-color: #8c7b6c;
    }

    button.secondary:hover {
      background-color: #6d5e51;
    }

    button.danger {
      background-color: var(--danger);
    }

    button.danger:hover {
      background-color: #701f18;
    }

    .msg {
      margin-top: 10px;
      padding: 8px;
      font-size: 0.9rem;
      display: none;
      border-radius: 2px;
    }

    .msg.show {
      display: block;
    }

    .msg.ok {
      background: #e1edd8;
      color: #274e13;
      border: 1px solid #c8e0b4;
    }

    .msg.err {
      background: #fadbd8;
      color: #78281f;
      border: 1px solid #f5b7b1;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    /* Estilo exato da ficha do acervo inspirada na referência */
    .disc-card {
      background: var(--card-bg);
      border: 1px dashed var(--border-color);
      padding: 18px;
      border-radius: 2px;
      position: relative;
    }

    .badge-id {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 0.85rem;
      color: #8c7b6c;
      font-weight: bold;
    }

    .disc-card h3 {
      margin: 0 0 12px 0;
      font-size: 1.25rem;
      padding-right: 45px;
      font-weight: bold;
    }

    .disc-card .sub {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .edit-row {
      margin-bottom: 8px;
    }

    .edit-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 0.85rem;
    }

    .actions {
      display: flex;
      gap: 5px;
    }

    .small {
      padding: 5px 10px;
      font-size: 0.75rem;
    }

    .empty-note {
      font-style: italic;
      color: #8c7b6c;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div id="vinyl"></div>
      <div>
        <h1>Arquivo Sonoro</h1>
        <small>Sistema de Gestão de Acervo Musical</small>
      </div>
    </header>

    <!-- PAINEL DE CADASTRO -->
    <div class="panel">
      <h2>Nova Ficha de Cadastro</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Título</label>
          <input type="text" id="c-titulo" placeholder="Ex: Águas de Março">
        </div>
        <div class="form-group">
          <label>Artista</label>
          <input type="text" id="c-artista" placeholder="Ex: Elis Regina">
        </div>
        <div class="form-group">
          <label>Compositor</label>
          <input type="text" id="c-compositor" placeholder="Ex: Tom Jobim">
        </div>
        <div class="form-group">
          <label>Gênero</label>
          <input type="text" id="c-genero" placeholder="Ex: MPB">
        </div>
        <div class="form-group">
          <label>Ano</label>
          <input type="number" id="c-ano" placeholder="Ex: 1972">
        </div>
      </div>
      <div class="btn-row">
        <button id="btnCadastrar">Arquivar Música</button>
        <button id="btnLimparCadastro" class="secondary">Limpar</button>
      </div>
      <div id="msgCadastrar" class="msg"></div>
    </div>

    <!-- PAINEL DE BUSCA -->
    <div class="panel">
      <h2>Consultar Acervo por Filtros</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Artista</label>
          <input type="text" id="b-artista">
        </div>
        <div class="form-group">
          <label>Compositor</label>
          <input type="text" id="b-compositor">
        </div>
        <div class="form-group">
          <label>Gênero</label>
          <input type="text" id="b-genero">
        </div>
        <div class="form-group">
          <label>Ano</label>
          <input type="number" id="b-ano">
        </div>
      </div>
      <div class="btn-row">
        <button id="btnBuscar">Filtrar</button>
        <button id="btnLimparBusca" class="secondary">Limpar Filtros</button>
      </div>
      <div id="msgBuscar" class="msg"></div>
      <div id="searchGrid" class="grid-cards"></div>
    </div>

    <!-- PAINEL DE LISTAGEM COMPLETA -->
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; margin-bottom: 15px;">
        <h2 style="margin:0; border:none; padding:0;">Acervo Completo</h2>
        <span id="countText" style="font-size: 0.85rem; font-weight: bold;">0 fichas no acervo</span>
      </div>
      <div class="btn-row" style="margin-bottom: 10px;">
        <button id="btnListar" class="secondary small">Atualizar Lista</button>
      </div>
      <div id="msgListar" class="msg"></div>
      <div id="catalogGrid" class="grid-cards"></div>
    </div>
  </div>

  <script>
  (function(){
    const API_BASE = '';

    const vinyl = document.getElementById('vinyl');
    const catalogGrid = document.getElementById('catalogGrid');
    const searchGrid = document.getElementById('searchGrid');
    const countText = document.getElementById('countText');

    function base(){
      return API_BASE.trim().replace(/\/+$/, '');
    }

    function showMsg(el, text, isError){
      if(!el) return;
      el.textContent = text;
      el.classList.remove('ok','err');
      el.classList.add('show', isError ? 'err' : 'ok');
    }

    function hideMsg(el){
      if(el) el.classList.remove('show');
    }

    let inflight = 0;
    function spinStart(){
      inflight++;
      if(vinyl) vinyl.classList.add('spinning');
    }

    function spinStop(){
      inflight = Math.max(0, inflight - 1);
      if(inflight === 0 && vinyl){
        vinyl.classList.remove('spinning');
      }
    }

    async function api(path, options){
      spinStart();
      try{
        const res = await fetch(base() + path, options);
        let data = null;
        try { data = await res.json(); } catch(e) { }
        if(!res.ok){
          const erro = (data && (data.erro || data.mensagem)) || ('Erro HTTP ' + res.status);
          throw new Error(erro);
        }
        return data;
      } finally {
        spinStop();
      }
    }

    function escapeHtml(str){
      return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function discCardTemplate(m, showActions = true){
      const div = document.createElement('div');
      div.className = 'disc-card';

      const id = m.Id ?? m.id;
      const titulo = m.Titulo ?? m.titulo ?? '(sem título)';
      const artista = m.Artista ?? m.artista ?? '—';
      const compositor = m.Compositor ?? m.compositor ?? '—';
      const genero = m.Genero ?? m.genero ?? '—';
      const ano = m.Ano ?? m.ano ?? '—';

      let html = `
        <span class="badge-id">#${id}</span>
        <h3>${escapeHtml(titulo)}</h3>
        <div class="sub">
          <strong>Artista:</strong> ${escapeHtml(artista)}<br>
          <strong>Compositor:</strong> ${escapeHtml(compositor)}<br>
          <strong>Gênero:</strong> ${escapeHtml(genero)} &middot; <strong>Ano:</strong> ${ano}
        </div>
      `;

      if (showActions) {
        html += `
          <div class="edit-row">
            <input type="text" placeholder="novo título" value="${escapeHtml(titulo)}">
          </div>
          <div class="actions">
            <button class="small" data-action="salvar" data-id="${id}">Renomear título</button>
            <button class="small danger" data-action="excluir" data-id="${id}">Excluir</button>
          </div>
        `;
      }

      div.innerHTML = html;
      return div;
    }

    function renderInto(grid, musicas, emptyText, showActions = true){
      if(!grid) return;
      grid.innerHTML = '';
      if(!musicas || musicas.length === 0){
        grid.innerHTML = `<div class="empty-note">${emptyText}</div>`;
        return;
      }
      musicas.forEach(m => grid.appendChild(discCardTemplate(m, showActions)));
    }

    function renderAcervo(musicas){
      renderInto(catalogGrid, musicas, 'Nenhuma música no acervo ainda.', true);
      if(countText) {
        countText.textContent = (musicas ? musicas.length : 0) + ((musicas && musicas.length === 1) ? ' ficha no acervo' : ' fichas no acervo');
      }
    }

    async function carregarAcervo(){
      const msgEl = document.getElementById('msgListar');
      try{
        const data = await api('/Listar', { method:'GET' });
        const lista = data?.musicascadastradas || data?.Musicascadastradas || [];
        renderAcervo(lista);
      } catch(err){
        showMsg(msgEl, 'Falha ao carregar o acervo: ' + err.message, true);
      }
    }

    const btnCadastrar = document.getElementById('btnCadastrar');
    if(btnCadastrar) {
      btnCadastrar.addEventListener('click', async () => {
        const msgEl = document.getElementById('msgCadastrar');
        hideMsg(msgEl);
        const titulo = document.getElementById('c-titulo').value.trim();
        const compositor = document.getElementById('c-compositor').value.trim();
        const artista = document.getElementById('c-artista').value.trim();
        const genero = document.getElementById('c-genero').value.trim();
        const ano = document.getElementById('c-ano').value;

        if(!titulo || !artista){
          showMsg(msgEl, 'Preencha ao menos título e artista antes de arquivar.', true);
          return;
        }

        try{
          const data = await api('/CadastrarMusica', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ titulo, compositor, artista, genero, ano: Number(ano) || 0 })
          });
          const m = data?.musica || data?.Musica;
          const tituloSalvo = m?.Titulo || m?.titulo || titulo;

          showMsg(msgEl, 'Música "' + tituloSalvo + '" cadastrada com sucesso.', false);
          ['c-titulo','c-compositor','c-artista','c-genero','c-ano'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = '';
          });
          await carregarAcervo();
        } catch(err){
          showMsg(msgEl, 'Não foi possível arquivar: ' + err.message, true);
        }
      });
    }

    const btnLimparCadastro = document.getElementById('btnLimparCadastro');
    if(btnLimparCadastro) {
      btnLimparCadastro.addEventListener('click', () => {
        ['c-titulo','c-compositor','c-artista','c-genero','c-ano'].forEach(id => {
          const el = document.getElementById(id);
          if(el) el.value = '';
        });
        hideMsg(document.getElementById('msgCadastrar'));
      });
    }

    async function executarBusca(silencioso = false) {
      const msgEl = document.getElementById('msgBuscar');
      hideMsg(msgEl);

      const params = new URLSearchParams();
      const artista = document.getElementById('b-artista').value.trim();
      const compositor = document.getElementById('b-compositor').value.trim();
      const genero = document.getElementById('b-genero').value.trim();
      const ano = document.getElementById('b-ano').value.trim();

      if(artista) params.set('artista', artista);
      if(compositor) params.set('compositor', compositor);
      if(genero) params.set('genero', genero);
      if(ano) params.set('ano', ano);

      try{
        const data = await api('/BuscarMusica?' + params.toString(), { method:'GET' });
        const resultados = data?.musica || data?.Musica || [];
        renderInto(searchGrid, resultados, 'Nenhuma música encontrada com esses filtros.', false);
      } catch(err){
        if(!silencioso) {
          showMsg(msgEl, 'Falha na consulta: ' + err.message, true);
        }
      }
    }

    const btnBuscar = document.getElementById('btnBuscar');
    if(btnBuscar) btnBuscar.addEventListener('click', () => executarBusca(false));

    const btnLimparBusca = document.getElementById('btnLimparBusca');
    if(btnLimparBusca) {
      btnLimparBusca.addEventListener('click', () => {
        ['b-artista','b-compositor','b-genero','b-ano'].forEach(id => {
          const el = document.getElementById(id);
          if(el) el.value = '';
        });
        hideMsg(document.getElementById('msgBuscar'));
        if(searchGrid) searchGrid.innerHTML = '';
      });
    }

    const btnListar = document.getElementById('btnListar');
    if(btnListar) {
      btnListar.addEventListener('click', () => {
        hideMsg(document.getElementById('msgListar'));
        carregarAcervo();
      });
    }

    if(catalogGrid) {
      catalogGrid.addEventListener('click', async (ev) => {
        const btn = ev.target.closest('button[data-action]');
        if(!btn) return;

        const id = btn.getAttribute('data-id');
        const action = btn.getAttribute('data-action');
        const card = btn.closest('.disc-card');
        const msgEl = document.getElementById('msgListar');
        hideMsg(msgEl);

        if(action === 'salvar'){
          const input = card.querySelector('input');
          const novoTitulo = input ? input.value.trim() : '';

          if(!novoTitulo){
            showMsg(msgEl, 'Informe um novo título antes de salvar.', true);
            return;
          }

          try{
            await api(`/AtualizarMusica/${id}/titulo`, {
              method:'PATCH',
              headers:{ 'Content-Type':'application/json' },
              body: JSON.stringify({ titulo: novoTitulo })
            });

            showMsg(msgEl, `Nome da música #${id} atualizado com sucesso!`, false);
            await carregarAcervo();

            if(searchGrid && searchGrid.children.length > 0) {
              executarBusca(true);
            }
          } catch(err){
            showMsg(msgEl, 'Não foi possível atualizar: ' + err.message, true);
          }
        }

        if(action === 'excluir'){
          if(!confirm('Remover esta ficha do acervo permanentemente?')) return;
          try{
            await api(`/DeletarMusica/${id}`, { method:'DELETE' });
            showMsg(msgEl, 'Ficha nº ' + id + ' removida com sucesso.', false);
            await carregarAcervo();
            
            if(searchGrid && searchGrid.children.length > 0) {
              executarBusca(true);
            }
          } catch(err){
            showMsg(msgEl, 'Não foi possível excluir: ' + err.message, true);
          }
        }
      });
    }

    carregarAcervo();
  })();
  </script>
</body>
</html>
